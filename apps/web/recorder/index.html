<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LedgerMind — My Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">
  <div class="screen">

    <header>
      <p class="eyebrow" id="businessNameDisplay">My Book — New Entry</p>
      <h1>Record a Sale</h1>
      <p class="helper">This is your recording space, just like your notebook. Fill in what you sold below.</p>
    </header>

    <form id="saleForm">
      <label>
        What did you sell?
        <input type="text" id="itemName" placeholder="e.g. Rice (50kg bag)" required autofocus>
      </label>

      <div class="row">
        <label>
          How many?
          <input type="number" id="quantity" value="1" min="1" required>
        </label>
        <label>
          Price per one (₦)
          <input type="number" id="unitPrice" placeholder="e.g. 2000" min="0" required>
        </label>
      </div>

      <label>
        How did the customer pay?
        <select id="paymentMethod">
          <option value="cash">Cash</option>
          <option value="pos">POS / Card</option>
          <option value="transfer">Bank Transfer</option>
          <option value="credit">Not yet — they'll pay later</option>
        </select>
      </label>

      <label id="customerField" class="hidden">
        Who owes you this money?
        <input type="text" id="customerName" placeholder="e.g. Chief Bola">
      </label>

      <div class="total-preview">
        <span>Total for this sale</span>
        <span id="totalDisplay">₦0</span>
      </div>

      <button type="submit" id="submitBtn">Save to My Book</button>
      <p id="statusMessage"></p>
    </form>

    <a class="link-back" href="#" id="backToDashboard">← Back to today's sales</a>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="app.js"></script>
</body>
</html>
