<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Brain — Record Sale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">
  <div class="screen">

    <header>
      <p class="eyebrow">New Transaction</p>
      <h1>Record a Sale</h1>
    </header>

    <form id="saleForm">
      <label>
        Item name
        <input type="text" id="itemName" placeholder="e.g. Rice (50kg bag)" required>
      </label>

      <div class="row">
        <label>
          Quantity
          <input type="number" id="quantity" value="1" min="1" required>
        </label>
        <label>
          Unit price (₦)
          <input type="number" id="unitPrice" placeholder="0" min="0" required>
        </label>
      </div>

      <label>
        Payment method
        <select id="paymentMethod">
          <option value="cash">Cash</option>
          <option value="pos">POS</option>
          <option value="transfer">Transfer</option>
          <option value="credit">Credit (customer owes)</option>
        </select>
      </label>

      <label id="customerField" class="hidden">
        Customer name
        <input type="text" id="customerName" placeholder="Who owes this?">
      </label>

      <div class="total-preview">
        <span>Total</span>
        <span id="totalDisplay">₦0</span>
      </div>

      <button type="submit" id="submitBtn">Save Sale</button>
      <p id="statusMessage"></p>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="app.js"></script>
</body>
  </html>
